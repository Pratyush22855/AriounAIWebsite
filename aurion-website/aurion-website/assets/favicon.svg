<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0affed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer hexagon -->
  <path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="4"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="15" fill="url(#gradient)"/>
  
  <!-- Connection lines -->
  <line x1="50" y1="35" x2="50" y2="10" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="50" y1="65" x2="50" y2="90" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="35" y1="50" x2="15" y2="50" stroke="url(#gradient)" stroke-width="2"/>
  <line x1="65" y1="50" x2="85" y2="50" stroke="url(#gradient)" stroke-width="2"/>
</svg>
